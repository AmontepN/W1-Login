<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    
    <div class="welcome-box">
        <img src="..\Image\Frame 3581.png" alt="Welcome to My Channel" class="banner-image">
    </div>

    <div class="login-box">
        <h2>
            <img src="..\Image\icon-lock.png" alt="Lock" class="lock-icon"> 
            Log in
        </h2>
        <p>Enter your username and password to log on</p>

        <div class="toggle-box">
            <button id="btn-token" class="toggle-btn active">TOKEN</button>
            <button id="btn-otp" class="toggle-btn">OTP</button>
        </div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Username">     
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
            <span class="eye-icon" id="toggle-eye">
                <img src="..\Image\eye-view.png" id="eye-icon-img" alt="Toggle Password"> 
            </span> 
        </div>
        <div id="token-box">
            <input type="text" id="token" placeholder="Token">
        </div>

        <div class="submit-box">
            <button id="login-submit-btn">Log In</button>
        </div>
    </div>

    <script src="Login.js"></script>
</body>
</html>
